name: Build and Test JTReg

on:
  push:
    branches-ignore:
      - master
      - pr/*

jobs:

  linux-x64:
    runs-on: ubuntu-latest

    steps:
    - name: 'Check out repository'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 1

    - name: 'Set up Java Development Kits'
      uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
      with:
        distribution: 'oracle'
        java-version: |
          25
          21

    - name: 'Build JTReg'
      shell: bash
      run: |
        java --version
        bash make/build.sh

    - name: 'Run initial tests (goal: quick-test)'
      shell: bash
      env:
        MAKE_ARGS: quick-test
        HEADLESS: 1
      run: |
        bash make/build.sh --skip-download

    - name: 'Run all tests (goal: test)'
      shell: bash
      env:
        MAKE_ARGS: test
        HEADLESS: 1
        JDK25HOME: ${{ env.JAVA_HOME_25_X64 }}
        JDK21HOME: ${{ env.JAVA_HOME_21_X64 }}
      run: |
        bash make/build.sh --skip-download

  freebsd-x64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run tests in FreeBSD
        id: test
        uses: vmactions/freebsd-vm@b84ab5559b5a1bb4b8ee2737d2506a16e1737636 # v1.4.8
        with:
          prepare: |
            pkg install -y bash curl git gmake gnugrep openjdk21 zip
            mount -t fdescfs fdesc /dev/fd
            mount -t procfs proc /proc

          run: |
            pwd
            ls -lah
            whoami
            env
            freebsd-version
            sysctl hw.model
            sysctl hw.ncpu
            sysctl hw.physmem
            sysctl hw.usermem
            pw user add -n action -m
            su action -c 'git config --global --add safe.directory $(pwd)'
            su action -c 'bash make/build.sh --jdk /usr/local/openjdk21'
            su action -c 'bash build/make.sh test'
